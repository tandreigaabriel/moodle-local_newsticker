name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        moodle-branch: ["MOODLE_405_STABLE", "MOODLE_500_STABLE"]
        database: ["mariadb"]

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, pdo, mbstring, curl, xml, zip, intl

      - name: Install moodle-plugin-ci
        run: |
          composer create-project moodlehq/moodle-plugin-ci ci ^4
          echo "$(pwd)/ci/bin" >> $GITHUB_PATH
          echo "$(pwd)/ci/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --branch ${{ matrix.moodle-branch }}
        env:
          DB: ${{ matrix.database }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint ./plugin

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs ./plugin --max-warnings 0

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc ./plugin --max-warnings 0

      - name: Validate Plugin
        run: moodle-plugin-ci validate ./plugin

      - name: Mustache Lint
        run: moodle-plugin-ci mustache moodle/local/newsticker
